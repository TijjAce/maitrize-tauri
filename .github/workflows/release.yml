name: Release

# Déclenché en poussant un tag de version, ex. : git tag v1.0.0 && git push origin v1.0.0
# (ou manuellement depuis l'onglet Actions).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # nécessaire pour créer la Release et y attacher les binaires

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # binaire universel (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest # .msi + .exe (NSIS)
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Dépendances front
        run: npm install

      - name: Build + signature updater + Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature des artefacts de mise à jour (clé minisign Tauri)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Signature + notarisation macOS (Developer ID, hors App Store) :
          # à RÉACTIVER quand les secrets Apple seront configurés. Tant qu'ils
          # sont vides, il NE FAUT PAS passer ces variables (sinon tauri-action
          # tente d'importer un certificat vide et échoue). Bloc à rajouter :
          #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Maitrize V2 ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ─────────────────────────────────────────────────────────────────────────
  # TODO (étape suivante) : signature de code Windows via SignPath.
  # Une fois le projet validé dans le programme open source de SignPath, ajouter
  # un job qui télécharge le .msi/.exe de la Release, le soumet à SignPath
  # (action signpath/github-action-submit-signing-request) et réuploade le binaire
  # signé. Cela supprime l'avertissement SmartScreen en distribution directe.
